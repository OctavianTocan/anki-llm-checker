var _ace = null;

var _ACE_CDN = 'https://cdn.jsdelivr.net/npm/ace-builds@1.36.5/src-min-noconflict';

/** Dynamically load a script from URL. */
function _loadScript(url) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = url; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

/* Load Ace core → autocomplete extension from CDN */
var _editorReady = _loadScript(_ACE_CDN + '/ace.js')
  .then(function() { return _loadScript(_ACE_CDN + '/ext-language_tools.js'); })
  .then(function() { return true; })
  .catch(function() {
    var t = document.getElementById('llm-code-toggle');
    if (t) t.style.display = 'none';
    return false;
  });

/** Toggle code editor visibility. Creates Ace instance on first open. */
function toggleCode() {
  var section = document.getElementById('llm-code-section');
  var toggle = document.getElementById('llm-code-toggle');

  if (section.classList.contains('visible')) {
    section.classList.remove('visible');
    toggle.innerHTML = 'Add code &#x2192;';
    return;
  }

  section.classList.add('visible');
  toggle.innerHTML = 'Hide code &#x2191;';

    ace.config.set('basePath', _ACE_CDN);
    var langTools = ace.require('ace/ext/language_tools');

    langTools.addCompleter({

        cb(null, words.filter(function(w) {

    var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (_ace) _ace.setTheme({ cssClass: 'ace-anki', isDark: e.matches, cssText: '', $id: 'ace/theme/anki' });

/** Switch syntax highlighting language. */
function changeLang(lang, btn) {
  _currentLang = lang;
  if (_ace) _ace.session.setMode('ace/mode/' + _langMap[lang]);
  if (btn) {
    var pills = document.getElementById('llm-lang-pills').children;
    for (var i = 0; i < pills.length; i++) pills[i].className = '';
    btn.className = 'active';
  }
}

/* Auto-expand code editor for LeetCode cards after CDN loads */
_editorReady.then(function(ok) {
  if (ok && document.getElementById('lc-url')) toggleCode();
});

function openLeetCode() {
  var el = document.getElementById('lc-url');
  if (!el) return;
  var anchor = el.querySelector('a');
  var url = anchor ? anchor.href : el.textContent.trim();
  if (url) pycmd('openurl::' + url);
}

var _llmHasChecked = false;

function checkAnswer() {
  var answer = document.getElementById('llm-input').value;
  var code = _ace ? _ace.getValue() : '';
  if (!answer.trim() && !code.trim()) return;

  /* Combine natural-language explanation with code */
  var combined = answer.trim();
  if (code.trim()) {
    combined += '\n\nCode:\n```\n' + code.trim() + '\n```';
  }

  /* Hide result, hide verdict, show shimmer */
  document.getElementById('llm-result').style.display = 'none';
  document.getElementById('llm-verdict').style.display = 'none';
  document.getElementById('llm-body').className = '';
  document.getElementById('llm-body').innerText = '';
  document.getElementById('llm-thinking').className = 'visible';

  var btn = document.getElementById('llm-send');
  btn.disabled = true;

  pycmd('llmcheck::' + JSON.stringify(combined));
}

/** Called by Python for each streaming chunk — shows accumulated text so far. */
function streamLLMChunk(text) {
  try {
    /* Hide shimmer on first chunk, show result card */
    document.getElementById('llm-thinking').className = '';
    var el = document.getElementById('llm-result');
    el.style.display = 'block';
    el.className = '';

    /* Set text with blinking cursor class */
    var body = document.getElementById('llm-body');
    body.className = 'streaming';
    body.innerText = text;
  } catch(e) {}
}

/** Called by Python when the stream is complete — does verdict extraction + button reset. */
function finalizeLLMStream(text) {
  try {
    _llmHasChecked = true;
    document.getElementById('llm-thinking').className = '';

    /* Remove streaming cursor */
    var body = document.getElementById('llm-body');
    body.className = '';

    /* Extract verdict */
    var verdict = '';
    try {
      var vm = text.match(/(?:suggest(?:ed)?|recommend(?:ed)?)\s+(?:anki\s+)?(?:button|rating|grade)?[:\s]*(again|hard|good|easy)/i);
      if (!vm) vm = text.match(/\b(Again|Hard|Good|Easy)\s*$/m);
      if (vm) verdict = vm[1].charAt(0).toUpperCase() + vm[1].slice(1).toLowerCase();
    } catch(e) {}

    var ve = document.getElementById('llm-verdict');
    if (verdict) {
      ve.style.display = 'block';
      var s = ve.querySelector('span');
      s.className = verdict.toLowerCase();
      s.textContent = '\u2192 ' + verdict;
    } else { ve.style.display = 'none'; }

    /* Clean verdict line from body */
    var bodyText = text;
    if (verdict) {
      try {
        var cleaned = text.replace(/(?:suggest(?:ed)?|recommend(?:ed)?)\s+(?:anki\s+)?(?:button|rating|grade)?[:\s]*(again|hard|good|easy)\s*/i, '').trim();
        if (cleaned) bodyText = cleaned;
      } catch(e) {}
    }
    body.innerText = bodyText;

    var el = document.getElementById('llm-result');
    el.style.display = 'block';
    el.className = '';
  } catch(e) {}
  _llmReset();
}

/** Legacy non-streaming fallback — also used by reviewer_did_show_answer hook. */
function showLLMResult(text) {
  document.getElementById('llm-thinking').className = '';
  finalizeLLMStream(text);
}

function showLLMError(text) {
  document.getElementById('llm-thinking').className = '';
  var el = document.getElementById('llm-result');
  document.getElementById('llm-verdict').style.display = 'none';
  document.getElementById('llm-body').className = '';
  document.getElementById('llm-body').innerText = text;
  el.style.display = 'block';
  el.className = 'error';
  _llmReset();
}

function _llmReset() {
  var btn = document.getElementById('llm-send');
  if (btn) btn.disabled = false;
}
</script>
